version: '3.8'

services:
  sdp-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdp-medical-app
    ports:
      - "8080:8080"
    volumes:
      # Persist SQLite database
      - sdp-data:/app/Client/client/data
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sdp-data:
    driver: local
