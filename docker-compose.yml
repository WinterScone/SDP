services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sdp
      POSTGRES_USER: sdp
      POSTGRES_PASSWORD: sdp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdp"]
      interval: 10s
      timeout: 5s
      retries: 5

  sdp-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdp-medical-app
    ports:
      - "8080:8080"
    env_file:
      - ./Client/client/.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
      - PGHOST=db
      - PGPORT=5432
      - PGDATABASE=sdp
      - PGUSER=sdp
      - PGPASSWORD=sdp
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pgdata:
    driver: local
