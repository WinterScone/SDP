<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>View All Patients</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .card {
            max-width: 1100px;
        }
        table {
            margin-top: 16px;
        }
        th, td {
            padding: 12px;
        }
        .top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        select:hover {
            border-color: #cbd5e1;
        }
    </style>
</head>
<body>
<section class="card">
    <div class="top">
        <h2 style="margin:0;">All Patients</h2>
        <button class="btn" onclick="window.location.href='/dashboard-advanced.html'">← Back</button>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>First</th>
            <th>Last</th>
            <th>DOB</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Created</th>
            <th>Linked Admin</th>
        </tr>
        </thead>
        <tbody id="rows">
        <tr><td colspan="8">Loading...</td></tr>
        </tbody>
    </table>
</section>

<!-- IMPORTANT: keep this at the bottom so DOM exists -->
<script src="view-all-patients.js"></script>
</body>
</html>
