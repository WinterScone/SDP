<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login</title>

    <style>
        body{
            margin:0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background:#f3f4f6;
            padding:24px;
        }

        .card{
            max-width:600px;
            margin:0 auto;
            background:#fff;
            border-radius:16px;
            padding:24px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        h2{
            margin-top:0;
            font-size:28px;
        }

        label{
            font-weight:600;
            display:block;
            margin-top:14px;
            font-size:16px;
        }


        input{
            width: 360px;
            max-width: 100%;
            padding:10px 12px;
            font-size:16px;
            margin-top:6px;
            border-radius:10px;
            border:2px solid #e5e7eb;
            outline:none;
            background:#fff;
        }


        input:focus{
            border-color:#cbd5e1;
        }

        .row{
            display:flex;
            align-items:center;
            gap:12px;
            margin-top:16px;
        }


        .btn{
            width:auto;
            padding:10px 20px;
            font-size:16px;
            border-radius:10px;
            border:2px solid #e5e7eb;
            background:#fff;
            cursor:pointer;
        }

        .btn:hover{
            background:#f9fafb;
        }

        #message{
            font-size:15px;
        }
    </style>
</head>

<body>
<section class="card">
    <h2>Admin</h2>

    <form id="loginForm" novalidate>
        <label for="username">Username</label>
        <input id="username" type="text" autocomplete="username" />

        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" />

        <div class="row">
            <button id="loginBtn" class="btn" type="submit">Login</button>
            <span id="message"></span>
        </div>
    </form>
</section>

<script src="/admin-login.js"></script>
</body>
</html>
