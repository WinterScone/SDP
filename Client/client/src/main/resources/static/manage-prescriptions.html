<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manage Prescriptions</title>
    <link rel="stylesheet" href="/css/common.css">
</head>

<body>
<section class="card wide">
    <div class="topbar">
        <h2>Manage Prescriptions</h2>
        <div class="topbar-actions">
            <div id="message" class="msg"></div>
            <button class="btn" onclick="window.location.href='/patients.html'">← Back</button>
        </div>
    </div>

    <h3 class="section-title">Patient Details</h3>
    <div class="table-wrapper">
        <table>
            <tbody id="patientInfo"></tbody>
        </table>
    </div>

    <h3 class="section-title">Prescriptions</h3>

    <button id="showFormBtn">+ Add Prescription</button>

    <div class="form-short" id="prescriptionForm" style="display: none;">
        <label for="newMedicine">Medicine</label>
        <select id="newMedicine" required></select>
        <p id="unitDoseHint" style="margin:4px 0 8px; font-size:13px; color:#57606a;"></p>

        <label for="newDosage">Quantity</label>
        <input id="newDosage" type="text" placeholder="e.g. 2" required />
        <p id="newDosageHint" style="margin:4px 0 8px; font-size:13px; color:#57606a;"></p>

        <label for="newFrequency">Frequency</label>
        <select id="newFrequency" required>
            <option value="">Select Frequency</option>
            <option value="1">Once a day</option>
            <option value="2">Twice a day</option>
            <option value="3">Three times a day</option>
            <option value="4">Four times a day</option>
        </select>

        <label>Scheduled Times</label>
        <div id="newScheduledTimesContainer"></div>

        <div class="row">
            <button id="addBtn" type="button">Add</button>
            <button type="button" id="cancelBtn">Cancel</button>
        </div>
        <div id="formMessage" class="msg" style="margin-top: 8px;"></div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>Medicine</th>
                <th>Medicine Code</th>
                <th>Unit Dosage</th>
                <th>Quantity</th>
                <th>Dosage</th>
                <th>Frequency</th>
                <th>Scheduled Times</th>
                <th>Updated</th>
                <th>Delete</th>
            </tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>
    </div>

    <div id="clusteringPreview" style="display:none; margin-top:16px;">
        <h3 class="section-title">Collection Schedule</h3>
        <p id="clusteringStat" style="font-size:13px; color:#57606a; margin-bottom:8px;"></p>
        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>Collection Time</th>
                    <th>Medications</th>
                </tr>
                </thead>
                <tbody id="clusteringRows"></tbody>
            </table>
        </div>
        <div id="clusteringWarnings" style="font-size:13px; color:#cf222e; margin-top:4px;"></div>
    </div>
</section>

<script src="/manage-prescriptions.js"></script>
</body>
</html>
