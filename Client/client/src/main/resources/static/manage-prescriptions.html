<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manage Prescriptions</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .card {
            max-width: 1100px;
        }
        input {
            width: 160px;
        }
        select {
            width: 260px;
        }
        .sectionTitle {
            margin-top: 18px;
        }
    </style>
</head>

<body>
<section class="card">
    <div class="topbar">
        <h2>Manage Prescriptions</h2>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="message" class="msg"></span>
            <button onclick="history.back()">← Back</button>
        </div>
    </div>

    <h3 class="sectionTitle">Patient Details</h3>
    <table>
        <tbody id="patientInfo"></tbody>
    </table>

    <h3 class="sectionTitle">Prescriptions</h3>

    <div style="display:flex; gap:10px; align-items:center; margin: 10px 0;">
        <select id="newMedicine"></select>
        <input id="newDosage" placeholder="Dosage (e.g. 500mg)" />
        <input id="newFrequency" placeholder="Frequency (e.g. 2/day)" />
        <button id="addBtn">Add</button>
    </div>

    <table>
        <thead>
        <tr>
            <th>Medicine</th>
            <th>Dosage</th>
            <th>Frequency</th>
            <th>Updated</th>
            <th>Delete</th>
        </tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>
</section>

<script src="/manage-prescriptions.js"></script>
</body>
</html>
