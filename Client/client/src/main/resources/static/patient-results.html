<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Patient Results</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .card {
            max-width: 1100px;
        }
    </style>
</head>

<body>
<section class="card">
    <div class="topbar">
        <h2>Patient Results</h2>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="message" class="msg"></span>
            <button onclick="window.location.href='/patients.html'">← Back</button>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>First</th>
            <th>Last</th>
            <th>DOB</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>
</section>

<script src="/patient-results.js"></script>
</body>
</html>
