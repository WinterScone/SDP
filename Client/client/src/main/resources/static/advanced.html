<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Advanced</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        h2 {
            margin: 0;
        }
        .topbar {
            margin-bottom: 16px;
        }
        .danger-zone {
            margin-top: 32px;
            padding: 20px;
            border: 2px solid #ef4444;
            border-radius: 8px;
            background: #fef2f2;
        }
        .danger-zone h3 {
            margin: 0 0 12px 0;
            color: #dc2626;
            font-size: 18px;
        }
        .danger-zone p {
            margin: 0 0 16px 0;
            color: #7f1d1d;
            font-size: 14px;
        }
        .danger-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .danger-btn:hover {
            background: #b91c1c;
        }
        #resetMessage {
            margin-top: 12px;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
        }
        #resetMessage.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }
        #resetMessage.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
    </style>
</head>

<body>

<section class="card">
    <div class="topbar">
        <h2>Advanced</h2>
        <button onclick="window.location.href='/dashboard.html'">← Back</button>
    </div>

    <div class="actions">

        <button onclick="window.location.href='/new-admin.html'">
            New Admin
        </button>

        <button onclick="window.location.href='/new-patient-assignment.html'">
            New Patient Assignment
        </button>

    </div>

    <div class="danger-zone">
        <h3>Danger Zone</h3>
        <p>Reset the database to initial state. This will remove all user-created admins and patients, keeping only seed data.</p>
        <button class="danger-btn" onclick="resetDatabase()">Reset Database</button>
        <div id="resetMessage" style="display:none;"></div>
    </div>
</section>

<script src="/advanced.js"></script>
</body>
</html>
