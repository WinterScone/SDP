<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Intake History</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .log-form {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
            margin-top: 16px;
        }

        .log-form .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .log-form label {
            font-size: 13px;
            font-weight: 600;
        }

        .log-form select,
        .log-form input[type="date"],
        .log-form input[type="time"],
        .log-form input[type="text"] {
            padding: 8px 10px;
            font-size: 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            background: #fff;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin: 0 0 4px 0;
        }

        #logMessage {
            font-size: 14px;
            margin-top: 8px;
        }

        .success { color: #16a34a; }
        .error   { color: #dc2626; }

        @media (max-width: 768px) {
            .log-form {
                flex-direction: column;
            }

            .log-form select,
            .log-form input[type="date"],
            .log-form input[type="time"],
            .log-form input[type="text"] {
                width: 100%;
                font-size: 16px;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

<section class="card wide" style="margin-bottom: 24px;">
    <div class="topbar">
        <h2 id="title">Intake History</h2>
        <div style="display:flex; gap:8px;">
            <button class="btn" id="backBtn" onclick="window.location.href='/patient-dashboard.html'">← Back</button>
            <button class="btn" id="logoutBtn">Logout</button>
        </div>
    </div>

    <p class="section-title">Log New Intake</p>
    <div class="log-form">
        <div class="field">
            <label for="medicineSelect">Medicine</label>
            <select id="medicineSelect">
                <option value="">— select —</option>
            </select>
        </div>
        <div class="field">
            <label for="takenDate">Date</label>
            <input type="date" id="takenDate" />
        </div>
        <div class="field">
            <label for="takenTime">Time</label>
            <input type="time" id="takenTime" />
        </div>
        <div class="field">
            <label for="notesInput">Notes (optional)</label>
            <input type="text" id="notesInput" placeholder="e.g. taken with food" maxlength="200" style="min-width:200px;" />
        </div>
        <div class="field">
            <label>&nbsp;</label>
            <button class="btn" id="logBtn">Log</button>
        </div>
    </div>
    <div id="logMessage"></div>
</section>

<section class="card wide">
    <p class="section-title">History</p>
    <div id="message" class="msg"></div>
    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>Medicine ID</th>
                <th>Medicine Name</th>
                <th>Date</th>
                <th>Time</th>
                <th>Notes</th>
            </tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>
    </div>
</section>

<script src="/intake-history.js"></script>
</body>
</html>
