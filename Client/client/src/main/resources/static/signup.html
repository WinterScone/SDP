<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Sign Up</title>

    <style>
        body{
            margin:0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background:#f3f4f6;
            padding:24px;
        }

        .card{
            max-width:600px;
            margin:0 auto;
            background:#fff;
            border-radius:16px;
            padding:24px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        h2{
            margin-top:0;
            font-size:28px;
        }

        label{
            font-weight:600;
            display:block;
            margin-top:14px;
            font-size:16px;
        }

        input{
            width:360px;
            max-width:100%;
            padding:10px 12px;
            font-size:16px;
            margin-top:6px;
            border-radius:10px;
            border:2px solid #e5e7eb;
            outline:none;
            background:#fff;
        }

        input:focus{
            border-color:#cbd5e1;
        }

        .row{
            display:flex;
            align-items:center;
            gap:12px;
            margin-top:16px;
        }

        button{
            width:auto;
            padding:10px 20px;
            font-size:16px;
            border-radius:10px;
            border:2px solid #e5e7eb;
            background:#fff;
            cursor:pointer;
        }

        button:hover{
            background:#f9fafb;
        }

        #su-message{
            font-size:15px;
        }
    </style>
</head>

<body>
<section class="card">
    <h2>Create Admin</h2>

    <form id="signupForm" novalidate>
        <label for="su-username">Username</label>
        <input id="su-username" type="text" autocomplete="username" />

        <label for="su-password">Password</label>
        <input id="su-password" type="password" autocomplete="new-password" />

        <div class="row">
            <button type="submit">Sign Up</button>
            <span id="su-message"></span>
        </div>
    </form>
</section>

<script src="/signup.js"></script>
</body>
</html>
