<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Patient Prescriptions</title>
    <link rel="stylesheet" href="/css/common.css">
</head>
<body>

<section class="card wide">
    <div class="topbar">
        <h2 id="title">Your Prescriptions</h2>
        <div class="topbar-actions">
            <button class="btn" onclick="window.location.href='/patient-dashboard.html'">← Back</button>
            <button class="btn" id="logoutBtn">Logout</button>
        </div>
    </div>

    <div id="message" class="msg"></div>

    <div class="table-wrapper">
        <table>
            <colgroup>
                <col class="col-id">
                <col class="col-small">
                <col class="col-small">
                <col class="col-large">
                <col class="col-medium">
                <col class="col-time">
            </colgroup>
            <thead>
            <tr>
                <th class="nowrap">Prescription ID</th>
                <th class="nowrap">Dispenser</th>
                <th class="nowrap">Medicine Code</th>
                <th class="wrap">Medicine Name</th>
                <th class="nowrap">Dosage</th>
                <th class="nowrap">Scheduled Time</th>
            </tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>
    </div>
</section>

<script src="/patient-prescriptions.js"></script>

</body>
</html>
