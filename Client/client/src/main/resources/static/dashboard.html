<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard</title>

    <style>
        body{
            margin:0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background:#f3f4f6;
            padding:24px;
        }

        .card{
            max-width:600px;
            margin:0 auto;
            background:#fff;
            border-radius:16px;
            padding:24px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        h2{
            margin-top:0;
        }

        .menu{
            display:flex;
            flex-direction:column;
            gap:14px;
            margin-top:16px;
        }

        .btn{
            width:100%;
            padding:16px;
            font-size:18px;
            border-radius:12px;
            border:2px solid #e5e7eb;
            background:#fff;
            cursor:pointer;
            text-align:left;
        }

        .btn:hover{
            background:#f9fafb;
        }
    </style>
</head>

<body>

<section class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Dashboard</h2>
        <button class="btn" id="logoutBtn" style="width:auto; padding:10px 16px; font-size:14px;">Logout</button>
    </div>

    <div class="menu">
        <button class="btn" onclick="window.location.href='/manage-admin.html'">
            Manage Admin
        </button>

        <button class="btn" onclick="window.location.href='/patient-search.html'">
            Manage Patient Details
        </button>

        <button class="btn" id="advancedBtn" style="display:none;" onclick="window.location.href='/manage-admin.html'">
            Advanced
        </button>

    </div>
</section>

<script src="/dashboard.js"></script>
</body>
</html>
