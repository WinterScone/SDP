<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Search Patient</title>
    <style>
        body{
            margin:0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background:#f3f4f6;
            padding:24px;
        }
        .card{
            max-width: 800px;
            margin: 0 auto;
            background:#fff;
            border-radius:16px;
            padding:24px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }
        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:12px;
        }
        input{
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 12px;
            border: 2px solid #e5e7eb;
            outline: none;
        }
        button{
            padding:10px 14px;
            font-size:16px;
            border-radius:12px;
            border:2px solid #e5e7eb;
            background:#fff;
            cursor:pointer;
        }
        button:hover{ background:#f9fafb; }
        .row{ display:flex; gap:12px; }
    </style>
</head>
<body>

<section class="card">
    <div class="topbar">
        <h2>Manage Patient Details</h2>
        <button onclick="window.location.href='/dashboard.html'">← Back</button>
    </div>

    <div class="row">
        <input id="q" placeholder="Search by phone / email / first name / last name" />
        <button id="searchBtn">Search</button>
    </div>
</section>

<script src="/patient-search.js"></script>
</body>
</html>
