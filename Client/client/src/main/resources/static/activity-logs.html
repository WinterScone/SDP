<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Activity Logs</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .card {
            max-width: 1400px;
        }
        .activity-type {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
        }
        .type-medicine { background: #dbeafe; color: #1e40af; }
        .type-prescription { background: #dcfce7; color: #166534; }
        .type-admin { background: #fef3c7; color: #92400e; }
        .type-patient { background: #e0e7ff; color: #3730a3; }
        .type-reset { background: #fee2e2; color: #991b1b; }
        .no-logs {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }
    </style>
</head>
<body>
<section class="card">
    <div class="topbar">
        <h2>Activity Logs</h2>
        <button class="btn" onclick="window.location.href='/advanced.html'">← Back</button>
    </div>

    <div class="table-wrapper">
        <table id="logsTable" style="display:none;">
            <thead>
            <tr>
                <th>Timestamp</th>
                <th>Activity Type</th>
                <th>Description</th>
                <th>Admin</th>
                <th>Patient</th>
                <th>Medicine</th>
            </tr>
            </thead>
            <tbody id="logsBody">
            </tbody>
        </table>
    </div>

    <div id="loadingMessage">
        <p style="text-align: center; padding: 40px; color: #6b7280;">Loading activity logs...</p>
    </div>

    <div id="noLogsMessage" class="no-logs" style="display:none;">
        <p>No activity logs found.</p>
    </div>

    <div id="errorMessage" style="display:none; text-align: center; padding: 40px; color: #dc2626;">
        <p>Failed to load activity logs. Please try again.</p>
    </div>
</section>

<!-- IMPORTANT: keep this at the bottom so DOM exists -->
<script src="activity-logs.js"></script>
</body>
</html>
