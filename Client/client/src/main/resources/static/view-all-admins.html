<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>View All Admins</title>
    <style>
        body{
            margin:0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background:#f3f4f6;
            padding:24px;
        }

        .card{
            max-width: 1100px;
            margin: 0 auto;
            background:#fff;
            border-radius:16px;
            padding:24px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        h2{
            margin:0;
        }

        .topbar{
            display:flex;
            gap:12px;
            align-items:center;
            justify-content:space-between;
            margin-bottom:12px;
        }

        button{
            padding:10px 14px;
            font-size:16px;
            border-radius:12px;
            border:2px solid #e5e7eb;
            background:#fff;
            cursor:pointer;
        }

        button:hover{
            background:#f9fafb;
        }

        table{
            width:100%;
            border-collapse:collapse;
            font-size:14px;
            margin-top: 10px;
        }

        th, td{
            padding:10px;
            border-bottom:1px solid #e5e7eb;
            text-align:left;
            vertical-align:middle;
        }

        th{
            background:#f9fafb;
        }

        .msg{
            font-size:14px;
            color:#6b7280;
        }

        .checkmark{
            color:#000;
            font-size:18px;
        }
    </style>
</head>

<body>
<section class="card">
    <div class="topbar">
        <h2>View All Admins</h2>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="message" class="msg"></span>
            <button onclick="window.location.href='/dashboard.html'">← Back</button>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>Admin Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Root</th>
        </tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>
</section>

<script src="/view-all-admins.js"></script>
</body>
</html>
