<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Patient Details</title>
    <link rel="stylesheet" href="/css/common.css">
</head>
<body>

<section class="card wide">
    <div class="topbar">
        <h2>Patient Details</h2>
        <button class="btn" onclick="window.history.back()">← Back</button>
    </div>

    <div id="message" class="msg"></div>

    <div style="display:flex; gap:24px; align-items:flex-start; flex-wrap:wrap; margin-top:16px;">
        <div>
            <h3>Face Image</h3>
            <img id="patientFace" width="220" height="180" style="border:1px solid #ccc; object-fit:cover;" />
        </div>

        <div id="content" style="min-width:280px;"></div>
    </div>

    <div id="editSection" style="display:none; margin-top:24px; padding:16px; border:1px solid #d0d7de; border-radius:6px; background:#f6f8fa;">
        <h3 style="margin-top:0">Edit Patient Details</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div>
                <label>First Name</label>
                <input id="editFirstName" type="text" />
            </div>
            <div>
                <label>Last Name</label>
                <input id="editLastName" type="text" />
            </div>
            <div>
                <label>Date of Birth</label>
                <input id="editDob" type="date" />
            </div>
            <div>
                <label>Email</label>
                <input id="editEmail" type="email" />
            </div>
            <div>
                <label>Phone</label>
                <input id="editPhone" type="text" />
            </div>
        </div>
        <div style="margin-top:12px; display:flex; flex-direction:column; gap:8px;">
            <label style="display:flex; align-items:center; gap:8px; font-weight:normal;">
                <input id="editSmsConsent" type="checkbox" style="width:auto; min-height:unset;" />
                SMS Consent
            </label>
            <label style="display:flex; align-items:center; gap:8px; font-weight:normal;">
                <input id="editFaceConsent" type="checkbox" style="width:auto; min-height:unset;" />
                Face Recognition Consent
            </label>
        </div>
        <div style="margin-top:16px; display:flex; gap:8px;">
            <button class="btn" onclick="submitEdit()">Save</button>
            <button class="btn" onclick="document.getElementById('editSection').style.display='none'">Cancel</button>
        </div>
    </div>
</section>

<script src="/patient-detail.js"></script>
</body>
</html>
