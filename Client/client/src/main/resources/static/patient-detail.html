<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Patient Details</title>
    <link rel="stylesheet" href="/css/common.css">
</head>
<body>

<section class="card wide">
    <div class="topbar">
        <h2>Patient Details</h2>
        <button class="btn" onclick="window.history.back()">← Back</button>
    </div>

    <div id="message" class="msg"></div>

    <!-- Profile Header -->
    <div style="display:flex; gap:20px; align-items:flex-start; flex-wrap:wrap;">
        <img id="patientFace" width="200" height="200" style="border:1px solid #d0d7de; object-fit:cover; border-radius:6px; flex-shrink:0;" />
        <div style="flex:1; min-width:200px;">
            <h3 id="patientName" style="margin:0 0 4px 0;"></h3>
            <p id="patientMeta" style="margin:0 0 12px 0; color:#57606a; font-size:14px;"></p>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <button type="button" id="recaptureBtn" class="btn">Recapture Face</button>
                <button type="button" class="btn" onclick="showEditForm()">Edit Details</button>
            </div>
        </div>
    </div>

    <!-- Information -->
    <div class="section-title">Information</div>
    <div id="content"></div>

    <!-- Recapture Face (collapsible) -->
    <div id="faceRecaptureSection" style="display:none; margin-top:24px; padding:16px; border:1px solid #d0d7de; border-radius:6px; background:#f6f8fa;">
        <h4 style="margin:0 0 12px 0;">Recapture Face</h4>
        <video id="faceVideo" width="200" height="200" autoplay playsinline style="display:none; border:1px solid #d0d7de; border-radius:6px; object-fit:cover"></video>
        <canvas id="faceCanvas" width="480" height="480" style="display:none"></canvas>
        <div style="display:flex; gap:0.5rem; margin-top:0.5rem; flex-wrap:wrap;">
            <button type="button" id="startCameraBtn" class="btn">Start Camera</button>
            <button type="button" id="captureFaceBtn" class="btn" style="display:none">Capture Face</button>
            <button type="button" id="saveFaceBtn" class="btn" style="display:none">Save</button>
            <button type="button" id="cancelRecaptureBtn" class="btn">Cancel</button>
        </div>
        <div id="faceStatus" class="msg" style="margin-top:0.25rem"></div>
    </div>

    <!-- Edit Patient Details (collapsible) -->
    <div id="editSection" style="display:none; margin-top:24px; padding:16px; border:1px solid #d0d7de; border-radius:6px; background:#f6f8fa;">
        <h4 style="margin:0 0 12px 0;">Edit Patient Details</h4>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div>
                <label>First Name</label>
                <input id="editFirstName" type="text" />
            </div>
            <div>
                <label>Last Name</label>
                <input id="editLastName" type="text" />
            </div>
            <div>
                <label>Date of Birth</label>
                <input id="editDob" type="date" />
            </div>
            <div>
                <label>Email</label>
                <input id="editEmail" type="email" />
            </div>
            <div>
                <label>Phone</label>
                <input id="editPhone" type="text" />
            </div>
        </div>
        <div style="margin-top:12px; display:flex; flex-direction:column; gap:8px;">
            <label style="display:flex; align-items:center; gap:8px; font-weight:normal;">
                <input id="editSmsConsent" type="checkbox" style="width:auto; min-height:unset;" />
                SMS Consent
            </label>
            <label style="display:flex; align-items:center; gap:8px; font-weight:normal;">
                <input id="editFaceConsent" type="checkbox" style="width:auto; min-height:unset;" />
                Face Recognition Consent
            </label>
        </div>
        <div style="margin-top:16px; display:flex; gap:8px;">
            <button class="btn btn-primary" onclick="submitEdit()">Save</button>
            <button class="btn" onclick="cancelEdit()">Cancel</button>
        </div>
    </div>
</section>

<script src="/patient-detail.js"></script>
</body>
</html>
