        <h2>Patient Details</h2>
        <button class="btn" onclick="window.history.back()">← Back</button>

    <div id="message" class="msg"></div>

        <div style="flex:1; min-width:200px;">
            <h3 id="patientName" style="margin:0 0 4px 0;"></h3>
            <p id="patientMeta" style="margin:0 0 12px 0; color:#57606a; font-size:14px;"></p>
        </div>
    </div>

    <!-- Information -->
    <div class="section-title">Information</div>
    <div id="content"></div>

    <div style="margin-top:16px;">
        <button type="button" class="btn" onclick="showEditForm()">Edit Details</button>
    </div>

            <div style="margin-top: 16px; padding: 12px; border: 1px solid #d0d7de; border-radius: 6px; background: #f6f8fa;">
                <div style="font-weight: 600; font-size: 14px; margin-bottom: 8px; color: #24292f;">Optional Services</div>
                <p style="font-size: 13px; color: #57606a; margin: 0 0 10px 0; line-height: 1.6;">You may opt in to the following services. You can change these preferences at any time by contacting your assigned administrator.</p>
                <label style="display: flex; align-items: flex-start; gap: 8px; font-weight: normal; cursor: pointer; margin-bottom: 8px;">
                    <input id="editSmsConsent" type="checkbox" style="width: auto; height: auto; margin-top: 2px; min-height: unset;" />
                    <span>I would like to receive medication reminders and notifications via SMS.</span>
                </label>
                <label style="display: flex; align-items: flex-start; gap: 8px; font-weight: normal; cursor: pointer;">
                    <input id="editFaceConsent" type="checkbox" style="width: auto; height: auto; margin-top: 2px; min-height: unset;" />
                    <span>I consent to the collection and use of my facial data for identity verification when collecting medication.</span>
                </label>
            </div>

            <div id="faceCaptureSection" style="display:none; margin-top:12px;">
                <label>Face Capture</label>
                <video id="faceVideo" width="200" height="200" autoplay playsinline style="display:none; border:1px solid #d0d7de; border-radius:6px; object-fit:cover"></video>
                <canvas id="faceCanvas" width="480" height="480" style="display:none"></canvas>
                <div class="row" style="gap:0.5rem; margin-top:0.5rem">
                    <button type="button" id="startCameraBtn" class="btn">Start Camera</button>
                    <button type="button" id="captureFaceBtn" class="btn" style="display:none">Capture Face</button>
                </div>
                <div id="faceStatus" class="msg" style="margin-top:0.25rem"></div>
            </div>

            <div class="row" style="margin-top:16px;">

                <button type="button" class="btn" onclick="cancelEdit()">Cancel</button>
