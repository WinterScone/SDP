<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manage Admin</title>

    <style>
        body{
            margin:0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background:#f3f4f6;
            padding:24px;
        }

        .card{
            max-width:600px;
            margin:0 auto;
            background:#fff;
            border-radius:16px;
            padding:24px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        h2{
            margin:0;
        }

        .topbar{
            display:flex;
            gap:12px;
            align-items:center;
            justify-content:space-between;
            margin-bottom:16px;
        }

        .actions{
            display:flex;
            flex-direction:column;
            gap:14px;
            margin-top:16px;
        }

        button{
            width:100%;
            padding:14px;
            font-size:18px;
            border-radius:12px;
            border:2px solid #e5e7eb;
            background:#fff;
            cursor:pointer;
            text-align:left;
        }

        .topbar button{
            width:auto;
            padding:10px 14px;
            font-size:16px;
        }

        button:hover{
            background:#f9fafb;
        }
    </style>
</head>

<body>

<section class="card">
    <div class="topbar">
        <h2>Manage Admin</h2>
        <button onclick="window.location.href='/dashboard.html'">← Back</button>
    </div>

    <div class="actions">

        <button onclick="window.location.href='/admin-signup.html'">
            + Create New Admin
        </button>

        <button onclick="window.location.href='/view-all-patients.html'">
            + View All Patients
        </button>

    </div>
</section>

<script src="/manage-admin.js"></script>
</body>
</html>
