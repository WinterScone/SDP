<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Patient Sign Up</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/form.css">
    <style>
        h2 {
            font-size: 28px;
        }
        #message {
            font-size: 15px;
        }
        .helper {
            margin-top: 14px;
            font-size: 14px;
            color: #6b7280;
        }
        .helper a {
            color: #111827;
            font-weight: 600;
            text-decoration: none;
            display: inline;
            padding: 0;
            border: none;
            background: none;
        }
        .helper a:hover {
            text-decoration: underline;
            background: none;
        }
    </style>
</head>

<body>
<section class="card">
    <div class="topbar">
        <h2>New Patient</h2>
        <button class="btn" onclick="window.location.href='/patient-login.html'">← Back</button>
    </div>

    <form id="signupForm" novalidate>
        <label for="username">Username</label>
        <input id="username" type="text" autocomplete="username" required />

        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="new-password" required />

        <label for="firstName">First name</label>
        <input id="firstName" type="text" autocomplete="given-name" required />

        <label for="lastName">Last name</label>
        <input id="lastName" type="text" autocomplete="family-name" required />

        <label for="dateOfBirth">Date of birth</label>
        <input id="dateOfBirth" type="date" required />

        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" />

        <label for="phone">Phone</label>
        <input id="phone" type="tel" autocomplete="tel" />

        <div class="row">
            <button class="btn" type="submit">Sign up</button>
            <span id="message"></span>
        </div>
    </form>

    <p class="helper">
        Existing patient? <a href="/patient-login.html">Log in</a>
    </p>
</section>

<script src="/patient-signup.js"></script>
</body>
</html>
