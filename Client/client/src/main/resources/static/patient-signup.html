<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Patient Sign Up</title>
    <link rel="stylesheet" href="/css/common.css">
</head>

<body>
<section class="card">
    <div class="topbar">
        <h2>New Patient</h2>
        <button class="btn" onclick="window.location.href='/patient-login.html'">← Back</button>
    </div>

    <form id="signupForm" class="form-long" novalidate>
        <label for="username">Username</label>
        <input id="username" type="text" autocomplete="username" required />

        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="new-password" required />

        <label for="firstName">First name</label>
        <input id="firstName" type="text" autocomplete="given-name" required />

        <label for="lastName">Last name</label>
        <input id="lastName" type="text" autocomplete="family-name" required />

        <label for="dateOfBirth">Date of birth</label>
        <input id="dateOfBirth" type="date" required />

        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" />

        <label for="phone">Phone</label>
        <input id="phone" type="tel" autocomplete="tel" />

        <div class="checkbox-row" style="margin-top:1rem">
            <input id="faceConsent" type="checkbox" />
            <label for="faceConsent">Enable face recognition &amp; SMS notifications</label>
        </div>
        <p id="faceConsentHint" class="helper" style="margin:0.25rem 0 0.5rem">
            If enabled, you can enroll your face for quick login and receive medication reminders via SMS.
        </p>

        <div id="faceSection" style="display:none; margin-bottom:1rem">
            <label>Face Capture (optional)</label>
            <video id="faceVideo" width="320" height="240" autoplay playsinline style="display:none; border:1px solid #ccc; border-radius:4px"></video>
            <canvas id="faceCanvas" width="320" height="240" style="display:none"></canvas>
            <div class="row" style="gap:0.5rem; margin-top:0.5rem">
                <button type="button" id="startCameraBtn" class="btn">Start Camera</button>
                <button type="button" id="captureFaceBtn" class="btn" style="display:none">Capture Face</button>
            </div>
            <div id="faceStatus" class="msg" style="margin-top:0.25rem"></div>
        </div>

        <div class="row">
            <button class="btn" type="submit">Sign up</button>
            <div id="message" class="msg"></div>
        </div>
    </form>

    <p class="helper">
        Existing patient? <a href="/patient-login.html">Log in</a>
    </p>
</section>

<script src="/patient-signup.js"></script>
</body>
</html>
