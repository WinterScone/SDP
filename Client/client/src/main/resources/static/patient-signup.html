<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Patient Sign Up</title>

    <style>
        body{
            margin:0;
            font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
            background:#f3f4f6;
            padding:24px;
        }

        .card{
            max-width:600px;
            margin:0 auto;
            background:#fff;border-radius:16px;
            padding:24px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        h2{
            margin-top:0;
            font-size:28px;
        }

        label{
            font-weight:600;
            display:block;
            margin-top:14px;
            font-size:16px;
        }

        input{
            width:360px;
            max-width:100%;
            padding:10px 12px;
            font-size:16px;
            margin-top:6px;
            border-radius:10px;
            border:2px solid #e5e7eb;
            outline:none;
            background:#fff;
        }

        input:focus{
            border-color:#cbd5e1;
        }

        .row{
            display:flex;
            align-items:center;
            gap:12px;
            margin-top:16px;
        }

        .btn{
            width:auto;
            padding:10px 20px;
            font-size:16px;
            border-radius:10px;
            border:2px solid #e5e7eb;
            background:#fff;
            cursor:pointer;
        }

        .btn:hover{
            background:#f9fafb;
        }

        #message{
            font-size:15px;
        }

        .helper{
            margin-top:14px;
            font-size:14px;
            color:#6b7280;
        }

        .helper a{
            color:#111827;
            font-weight:600;
            text-decoration:none;
        }

        .helper a:hover{
            text-decoration:underline;
        }

    </style>
</head>

<body>
<section class="card">
    <h2>Create Patient Account</h2>

    <form id="signupForm" novalidate>
        <label for="username">Username</label>
        <input id="username" type="text" autocomplete="username" required />

        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="new-password" required />

        <label for="firstName">First name</label>
        <input id="firstName" type="text" autocomplete="given-name" required />

        <label for="lastName">Last name</label>
        <input id="lastName" type="text" autocomplete="family-name" required />

        <label for="dateOfBirth">Date of birth</label>
        <input id="dateOfBirth" type="date" required />

        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" />

        <label for="phone">Phone</label>
        <input id="phone" type="tel" autocomplete="tel" />

        <div class="row">
            <button class="btn" type="submit">Sign up</button>
            <span id="message"></span>
        </div>
    </form>

    <p class="helper">
        Already have an account? <a href="/patient-login.html">Log in</a>
    </p>
</section>

<script src="/patient-signup.js"></script>
</body>
</html>
