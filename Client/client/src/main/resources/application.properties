server.port=8080
spring.application.name=SDP-Client

management.endpoints.web.exposure.include=health,info,metrics,env,loggers
management.endpoint.health.show-details=always

# Database configuration (works both locally and in Docker)
spring.datasource.url=jdbc:sqlite:${DB_PATH:${user.dir}/Client/client/data}/sdp.db
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Session configuration for production
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax



machine.api.key=${MACHINE_API_KEY:machine-123456-secure-key}

