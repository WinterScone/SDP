server.port=8080
spring.application.name=SDP-Client

management.endpoints.web.exposure.include=health,info,metrics,env,loggers
management.endpoint.health.show-details=always

# Database configuration (PostgreSQL)
# Railway: DATABASE_URL is auto-injected by the Postgres plugin — parsed by DatabaseConfig.java
# Local dev: uses these defaults (no DATABASE_URL set)
spring.datasource.url=jdbc:postgresql://localhost:5432/sdp
spring.datasource.username=sdp
spring.datasource.password=sdp
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Session configuration for production
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax

# Python service
python.service.url=http://localhost:5000

# Twilio SMS configuration (loaded from environment variables)
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:}
